<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
    }
    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 40px 13px rgba(59, 130, 246, 0.35);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: inset 0 0 40px 13px rgba(59, 130, 246, 0.28); }
      50%       { box-shadow: inset 0 0 40px 13px rgba(59, 130, 246, 0.45); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
</body>
</html>
